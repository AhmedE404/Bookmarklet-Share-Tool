<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bookmarklet Forge</title><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:#f8f9fa;color:#212529;overflow:hidden}#createMode,#installMode{display:none;z-index:10}#installMode{text-align:center;user-select:none}.btn-drag{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background-color:#212529;color:#fff;text-decoration:none;font-size:16px;font-weight:500;border-radius:6px;cursor:grab;box-shadow:0 4px 6px rgba(0,0,0,.1);transition:transform .2s ease,box-shadow .2s ease;letter-spacing:.3px}.btn-drag:hover{transform:translateY(-1px);box-shadow:0 6px 12px rgba(0,0,0,.15)}.btn-drag:active{cursor:grabbing}.hint{margin-top:20px;color:#6c757d;font-size:14px;line-height:1.6}kbd{background:#e9ecef;border:1px solid #ced4da;border-radius:4px;padding:2px 6px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#495057}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(33,37,41,.9);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s ease;display:flex;flex-direction:column;align-items:center;padding-top:60px;color:#f8f9fa}.overlay.active{opacity:1}.arrows{font-size:32px;font-weight:300;letter-spacing:20px;animation:bounce 1s infinite}.overlay-text{font-size:18px;font-weight:400;margin-top:15px;letter-spacing:.5px}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}#createMode{background:#fff;padding:40px;border-radius:8px;border:1px solid #dee2e6;width:100%;max-width:480px;box-shadow:0 10px 24px rgba(0,0,0,.04)}h2{margin-top:0;color:#212529;font-size:20px;font-weight:600;margin-bottom:24px}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:500;font-size:13px;col
