<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>أدوات المتصفح (Offline)</title><style>body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;background-color:#fff;color:#333;overflow:hidden}#createMode,#installMode{display:none;z-index:10}#installMode{text-align:center;user-select:none}.btn-drag{display:inline-flex;align-items:center;gap:10px;padding:16px 40px;background-color:#111;color:#fff;text-decoration:none;font-size:18px;font-weight:600;border-radius:8px;cursor:grab;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:.2s ease}.btn-drag:active{cursor:grabbing}.btn-drag:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2)}.hint{margin-top:24px;color:#666;font-size:15px;line-height:1.6}kbd{background:#f4f4f4;border:1px solid #ddd;border-radius:4px;padding:2px 6px;font-family:monospace;font-size:13px;color:#333}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s ease;display:flex;flex-direction:column;align-items:center;padding-top:50px;color:#fff}.overlay.active{opacity:1}.arrows{font-size:45px;font-weight:300;letter-spacing:15px;animation:bounce 1s infinite}.overlay-text{font-size:20px;font-weight:500;margin-top:15px}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}#createMode{background:#f9f9f9;padding:40px;border-radius:12px;border:1px solid #eaeaea;width:100%;max-width:500px;box-shadow:0 10px 30px rgba(0,0,0,.05)}h2{margin-top:0;color:#111;font-size:22px;text-align:center}.form-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:600;font-size:14px}input[type=text],textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:6px;font-family:monospace;font-size:14px;box-sizing:border-box;direction:ltr;text-align:left}textarea{resize:vertical;min-height:120px}input[type=text]:focus,textarea:focus{outline:0;border-color:#111}.btn-generate{width:100%;padding:14px;background:#111;color:#fff;border:0;border-radius:6px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}.btn-generate:hover{background:#333}.result-box{margin-top:20px;display:none}.result-box input{background:#fff;cursor:copy}.success-msg{color:#00a400;font-size:14px;text-align:center;margin-top:10px;display:none}.edit-btn{margin-top:15px;background:0 0;border:0;color:#06c;cursor:pointer;text-decoration:underline;font-size:14px}</style></head><body><div class="overlay" id="dragOverlay"><div class="arrows">↑ ↑ ↑</div><div class="overlay-text">أفلت الزر هنا في شريط الإشارات المرجعية</div></div><div id="installMode"><a href="#" class="btn-drag" id="toolBtn">اسحب هذا لشريط المفضلة</a><div class="hint">اسحب الزر للأعلى.<br>لإظهار الشريط اضغط <kbd id="ctrlKey">Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>B</kbd></div><button class="edit-btn" id="editBtn">✏️ تعديل كود الأداة</button></div><div id="createMode"><h2>🛠️ صانع البوكماركلت</h2><div class="form-group"><label>اسم الأداة (اختياري)</label><input type="text" id="bmName" placeholder="مثال: أداة سحب الصور" dir="rtl" style="text-align:right;font-family:inherit"></div><div class="form-group"><label>كود الجافاسكريبت</label><textarea id="bmCode" placeholder="(async () => { ... })();"></textarea></div><button class="btn-generate" id="generateBtn">توليد الرابط المضغوط</button><div class="result-box" id="resultBox"><label>رابط المشاركة (اضغط للنسخ):</label><input type="text" id="outputUrl" readonly title="اضغط لنسخ الرابط"><div class="success-msg" id="successMsg">تم نسخ الرابط بنجاح!</div></div></div><script>const isMac=navigator.platform.toUpperCase().indexOf("MAC")>=0||navigator.userAgent.includes("Mac");isMac&&(document.getElementById("ctrlKey").innerText="⌘");function bytesToBase64Url(e){let t="";for(let n=0;n<e.byteLength;n++)t+=String.fromCharCode(e[n]);return btoa(t).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"")}function base64UrlToBytes(e){let t=e.replace(/-/g,"+").replace(/_/g,"/");for(;t.length%4;)t+="=";const n=atob(t),o=new Uint8Array(n.length);for(let e=0;e<n.length;e++)o[e]=n.charCodeAt(e);return o}async function compressData(e){const t=new Response(JSON.stringify(e)).body.pipeThrough(new CompressionStream("deflate-raw"));return bytesToBase64Url(new Uint8Array(await new Response(t).arrayBuffer()))}async function decompressData(e){const t=base64UrlToBytes(e),n=new Response(t).body.pipeThrough(new DecompressionStream("deflate-raw"));return JSON.parse(new TextDecoder().decode(await new Response(n).arrayBuffer()))}async function renderView(){const e=window.location.hash.substring(1),t=document.getElementById("installMode"),n=document.getElementById("createMode");if(e)try{const o=await decompressData(e),a=document.getElementById("toolBtn");a.innerHTML=o.name.trim()||"اسحب هذا لشريط المفضلة";let r=o.code.trim();r.startsWith("javascript:")&&(r=r.replace("javascript:","")),a.href="javascript:"+encodeURIComponent(r),n.style.display="none",t.style.display="block",document.getElementById("bmName").value=o.name,document.getElementById("bmCode").value=o.code}catch(e){console.error("الرابط تالف:",e),window.location.hash=""}else t.style.display="none",n.style.display="block",document.getElementById("resultBox").style.display="none"}window.addEventListener("hashchange",renderView),document.getElementById("generateBtn").addEventListener("click",async()=>{const e=document.getElementById("bmName").value,t=document.getElementById("bmCode").value;if(!t.trim())return alert("يرجى إدخال كود الجافاسكريبت أولاً!");const n=await compressData({name:e,code:t}),o=window.location.href.split("#")[0]+"#"+n,a=document.getElementById("outputUrl");a.value=o,document.getElementById("resultBox").style.display="block",document.getElementById("successMsg").style.display="none"}),document.getElementById("outputUrl").addEventListener("click",function(){this.select(),document.execCommand("copy"),document.getElementById("successMsg").style.display="block"});const btn=document.getElementById("toolBtn"),overlay=document.getElementById("dragOverlay");btn.addEventListener("dragstart",()=>overlay.classList.add("active")),btn.addEventListener("dragend",()=>overlay.classList.remove("active")),btn.addEventListener("click",e=>e.preventDefault()),document.getElementById("editBtn").addEventListener("click",()=>{window.location.hash=""}),renderView();</script></body></html>
