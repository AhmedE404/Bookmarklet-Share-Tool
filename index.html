<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات المتصفح</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="overlay" id="dragOverlay">
        <div class="arrows">↑ ↑ ↑</div>
        <div class="overlay-text">أفلت الزر هنا في شريط الإشارات المرجعية</div>
    </div>

    <div id="installMode">
        <a href="#" class="btn-drag" id="toolBtn">اسحب هذا لشريط المفضلة</a>
        <div class="hint">
            اسحب الزر للأعلى.<br>
            لإظهار الشريط اضغط <kbd id="ctrlKey">Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>B</kbd>
        </div>
        <button class="edit-btn" id="editBtn">✏️ تعديل كود الأداة</button>
    </div>

    <div id="createMode">
        <h2>🛠️ صانع البوكماركلت</h2>
        <div class="form-group">
            <label>اسم الأداة (اختياري)</label>
            <input type="text" id="bmName" placeholder="مثال: أداة سحب الصور" dir="rtl"
                style="text-align: right; font-family: inherit;">
        </div>
        <div class="form-group">
            <label>كود الجافاسكريبت</label>
            <textarea id="bmCode" placeholder="(async () => { ... })();"></textarea>
        </div>
        <button class="btn-generate" id="generateBtn">توليد الرابط المضغوط</button>
        <div class="result-box" id="resultBox">
            <label>رابط المشاركة (اضغط للنسخ):</label>
            <input type="text" id="outputUrl" readonly title="اضغط لنسخ الرابط">
            <div class="success-msg" id="successMsg">تم نسخ الرابط بنجاح!</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
